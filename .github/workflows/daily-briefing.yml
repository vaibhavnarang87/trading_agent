name: Daily briefing

on:
  schedule:
    # 21:15 UTC = 4:15 PM ET (EDT). During EST this runs 5:15 PM ET — still
    # after close. Adjust if you want exact ET timing year-round.
    - cron: "15 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # This repo IS the trading_agent package (uses relative imports), so it
      # must be checked out into a subfolder named trading_agent — `python -m
      # trading_agent.X` needs a parent dir containing that folder, same as
      # the local convention in BUILD.md.
      - uses: actions/checkout@v4
        with:
          path: trading_agent

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r trading_agent/requirements.txt

      - name: Generate today's briefing
        run: python3 -m trading_agent.briefing_daily

      - name: Rebuild static site
        run: python3 -m trading_agent.publish_site

      - name: Commit and push if changed
        working-directory: trading_agent
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/briefings docs
          git diff --cached --quiet || git commit -m "Daily briefing: $(date -u +%Y-%m-%d)"
          git push
